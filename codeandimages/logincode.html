<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c4a60",
                        "background-light": "#f5f0f0",
                        "background-dark": "#1c1618",
                        "outline-custom": "#837377",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Admin Login | PawTaker</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<header class="w-full px-6 py-4 flex items-center justify-between bg-white/50 dark:bg-background-dark/50 backdrop-blur-sm border-b border-outline-custom/20">
<div class="flex items-center gap-2 text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="pets">pets</span>
<span class="text-xl font-bold tracking-tight">PawTaker</span>
</div>
<nav>
<a class="text-sm font-medium hover:text-primary transition-colors" href="#">Support</a>
</nav>
</header>
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-xl shadow-xl shadow-primary/5 border border-outline-custom/20 p-8 md:p-10">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary/10 text-primary mb-4">
<span class="material-symbols-outlined text-4xl" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
<h1 class="text-3xl font-bold text-primary mb-2">Admin Login</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Welcome back! Please enter your details.</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-custom text-xl" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-outline-custom rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="admin@pawtaker.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-custom text-xl" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-outline-custom rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 mb-2">
<input class="rounded border-outline-custom text-primary focus:ring-primary h-4 w-4" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg transition-all flex items-center justify-center gap-2 group shadow-lg shadow-primary/20" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-outline-custom/10 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    Need help accessing your account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Contact System Admin</a>
</p>
</div>
</div>
</main>
<footer class="py-6 text-center text-xs text-slate-400 dark:text-slate-500">
<p>© 2024 PawTaker Management Systems. All rights reserved.</p>
<div class="mt-2 flex justify-center gap-4">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Security Terms</a>
</div>
</footer>
</body></html>
